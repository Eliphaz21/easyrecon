<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .box { fill: #0d1117; stroke: #2ea043; stroke-width: 1.5; rx: 6; }
    .accent { fill: #2ea043; }
    .label { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; font-weight: 700; fill: #e6edf3; }
    .sub { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; fill: #484f58; }
    .num { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 700; fill: #2ea043; }
    .out { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; fill: #3d444d; text-anchor: end; }
    .dash { stroke: #2ea043; stroke-width: 1.5; stroke-dasharray: 4,3; fill: none; }
    .arr { fill: #2ea043; }
  </style>
  <rect width="800" height="380" class="bg"/>

  <!-- Phase 01 -->
  <rect x="30" y="20" width="740" height="62" rx="5" class="box"/>
  <rect x="30" y="20" width="5" height="62" rx="2" class="accent"/>
  <text x="52" y="42" class="num">01</text>
  <text x="80" y="42" class="label">SUBDOMAIN ENUMERATION</text>
  <text x="80" y="62" class="sub">subfinder  ·  amass  ·  assetfinder  →  parallel  →  merge + deduplicate</text>
  <text x="766" y="42" class="out">all_subdomains.txt</text>

  <!-- arrow -->
  <line x1="400" y1="82" x2="400" y2="102" class="dash"/>
  <polygon points="395,100 400,110 405,100" class="arr"/>

  <!-- Phase 02 -->
  <rect x="30" y="112" width="740" height="62" rx="5" class="box"/>
  <rect x="30" y="112" width="5" height="62" rx="2" class="accent"/>
  <text x="52" y="134" class="num">02</text>
  <text x="80" y="134" class="label">URL DISCOVERY</text>
  <text x="80" y="154" class="sub">gau  ·  waybackurls  ·  katana  →  parallel  →  merge + deduplicate</text>
  <text x="766" y="134" class="out">all_urls.txt</text>

  <!-- arrow -->
  <line x1="400" y1="174" x2="400" y2="194" class="dash"/>
  <polygon points="395,192 400,202 405,192" class="arr"/>

  <!-- Phase 03 -->
  <rect x="30" y="204" width="740" height="62" rx="5" class="box"/>
  <rect x="30" y="204" width="5" height="62" rx="2" class="accent"/>
  <text x="52" y="226" class="num">03</text>
  <text x="80" y="226" class="label">LIVE HOST DETECTION</text>
  <text x="80" y="246" class="sub">httpx  →  HTTP probing  ·  status codes  ·  response fingerprinting</text>
  <text x="766" y="226" class="out">live_subdomains.txt  ·  live_urls.txt</text>

  <!-- arrow -->
  <line x1="400" y1="266" x2="400" y2="286" class="dash"/>
  <polygon points="395,284 400,294 405,284" class="arr"/>

  <!-- Phase 04 -->
  <rect x="30" y="296" width="740" height="62" rx="5" class="box"/>
  <rect x="30" y="296" width="5" height="62" rx="2" class="accent"/>
  <text x="52" y="318" class="num">04</text>
  <text x="80" y="318" class="label">CATEGORIZE + REPORT</text>
  <text x="80" y="338" class="sub">12 attack surface buckets  →  priority sorted  →  report.md + errors.log</text>
  <text x="766" y="318" class="out">categorized/  ·  report.md</text>
</svg>
