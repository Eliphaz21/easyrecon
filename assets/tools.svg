<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg   { fill: #0d1117; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .zone { fill: #0d1117; stroke: #1a3a2a; stroke-width: 1; stroke-dasharray: 4,3; }
    .card { fill: #0f1f14; stroke: #2ea043; stroke-width: 1; }
    .tool { font-size: 12px; font-weight: 700; fill: #2ea043; }
    .role { font-size: 9px; fill: #3d444d; }
    .zlbl { font-size: 10px; fill: #3d444d; }
    .note { font-size: 10px; fill: #3d444d; }
  </style>
  <rect width="800" height="200" class="bg"/>

  <!-- zone labels -->
  <text x="130" y="18" class="mono zlbl" text-anchor="middle">SUBDOMAIN</text>
  <text x="400" y="18" class="mono zlbl" text-anchor="middle">URL DISCOVERY</text>
  <text x="670" y="18" class="mono zlbl" text-anchor="middle">LIVE</text>

  <!-- zone backgrounds -->
  <rect x="20"  y="24" width="220" height="152" rx="5" class="zone"/>
  <rect x="280" y="24" width="240" height="152" rx="5" class="zone"/>
  <rect x="560" y="24" width="220" height="152" rx="5" class="zone"/>

  <!-- subfinder -->
  <rect x="36"  y="38" width="90" height="52" rx="4" class="card"/>
  <text x="81"  y="61" class="mono tool" text-anchor="middle">subfinder</text>
  <text x="81"  y="76" class="mono role" text-anchor="middle">fast passive</text>

  <!-- amass -->
  <rect x="36"  y="106" width="90" height="52" rx="4" class="card"/>
  <text x="81"  y="129" class="mono tool" text-anchor="middle">amass</text>
  <text x="81"  y="144" class="mono role" text-anchor="middle">deep passive</text>

  <!-- assetfinder -->
  <rect x="142" y="38" width="84" height="120" rx="4" class="card"/>
  <text x="184" y="102" class="mono tool" text-anchor="middle">asset</text>
  <text x="184" y="117" class="mono tool" text-anchor="middle">finder</text>
  <text x="184" y="132" class="mono role" text-anchor="middle">lightweight</text>

  <!-- gau -->
  <rect x="296" y="38" width="100" height="52" rx="4" class="card"/>
  <text x="346" y="61" class="mono tool" text-anchor="middle">gau</text>
  <text x="346" y="76" class="mono role" text-anchor="middle">AlienVault+WB</text>

  <!-- waybackurls -->
  <rect x="296" y="106" width="100" height="52" rx="4" class="card"/>
  <text x="346" y="126" class="mono tool" text-anchor="middle">wayback</text>
  <text x="346" y="141" class="mono tool" text-anchor="middle">urls</text>
  <text x="346" y="153" class="mono role" text-anchor="middle">Wayback Machine</text>

  <!-- katana -->
  <rect x="412" y="38" width="96" height="120" rx="4" class="card"/>
  <text x="460" y="102" class="mono tool" text-anchor="middle">katana</text>
  <text x="460" y="117" class="mono role" text-anchor="middle">JS crawler</text>

  <!-- httpx -->
  <rect x="576" y="38" width="188" height="120" rx="4" class="card"/>
  <text x="670" y="96" class="mono tool" text-anchor="middle">httpx</text>
  <text x="670" y="112" class="mono role" text-anchor="middle">probe + fingerprint</text>

  <text x="400" y="192" class="mono note" text-anchor="middle">all tools install automatically via  go install  on first run</text>
</svg>
